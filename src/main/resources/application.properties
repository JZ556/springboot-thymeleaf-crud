spring.application.name=beststore
# 1. Database Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/beststore?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / Hibernate Configurations
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# 3. Optional: SQL Logging (Highly recommended for development)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Tells Spring to search for and apply 'application-local.properties' values
spring.profiles.active=local
